spring:
  application:
    name: UsersService
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/usersdb
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092